# ══════════════════════════════════════════════════════════════════════════════
# Warden Core Rules — Safety & Integrity
# ══════════════════════════════════════════════════════════════════════════════
#
# These rules protect against destructive operations, agent hallucinations,
# and credential exposure. They are ALWAYS active and cannot be disabled
# via config.toml restrictions.disable (can_disable = false).
#
# To EXTEND (add your own patterns on top of these):
#   Just add patterns to the relevant section below.
#
# To REPLACE all patterns in a section (not recommended for core):
#   Set replace = true in the section header.
# ══════════════════════════════════════════════════════════════════════════════

# ── Safety: destructive system operations ────────────────────────────────────

[safety]
patterns = [
    { match = '\brm\s+-rf?\s+[~*/.]', msg = "BLOCKED: rm -rf on broad paths is not allowed. Remove specific files by name instead." },
    { match = 'chmod 777', msg = "BLOCKED: chmod 777 is not allowed. Use more restrictive permissions (e.g. 755 or 644)." },
    { match = '\bsudo\s', msg = "BLOCKED: sudo is not allowed. Run the command without sudo." },
    # Git: block ALL mutating operations (read-only only: log, status, diff, show, branch, remote, blame)
    { match = '\bgit\s+(push|pull|merge|rebase|cherry-pick|stash|reset|clean|checkout|restore|revert|bisect|am|apply)\b', msg = "BLOCKED: Mutating git operation. Only read-only git commands allowed. Ask the user for write operations." },
    { match = '\bgit\s+branch\s+-[dD]\b', msg = "BLOCKED: Branch deletion is not allowed. Ask the user." },
    { match = 'push\s+--force\b', msg = "BLOCKED: force push is not allowed. Ask the user." },
    { match = '\bgit\s+(add|commit|tag)\b', msg = "BLOCKED: git add/commit/tag modify the repository. Ask the user first." },
]

# ── Destructive: tools that auto-modify code ─────────────────────────────────

[destructive]
patterns = [
    { match = 'knip --fix', msg = "BLOCKED: knip --fix auto-deletes code. Run knip without --fix first, then ask the user." },
    { match = '\bsg\s.*\s-r\s', msg = "BLOCKED: sg rewrite modifies files in-place. Add --dry-run first, review output, then ask the user." },
    { match = 'madge --image', msg = "BLOCKED: madge --image writes a file. Use madge --circular instead for text output." },
]

# ── Hallucination: agent-generated dangerous patterns ────────────────────────

[hallucination]
patterns = [
    { match = '%2e%2e(%2f|/)|%252e', msg = "BLOCKED: URL-encoded path traversal." },
    { match = '/dev/tcp/', msg = "BLOCKED: Reverse shell pattern (/dev/tcp/)." },
    { match = '\bnc\b.*\s-e\s', msg = "BLOCKED: Netcat with execute flag." },
    { match = 'bash\s+-i\s+>&', msg = "BLOCKED: Interactive reverse shell redirect." },
    { match = '(>|tee\s+\S*)\s*~?/?\.ssh/', msg = "BLOCKED: Writing to .ssh directory." },
    { match = '(>|tee\s+\S*)\s*~?/?\.gnupg/', msg = "BLOCKED: Writing to .gnupg directory." },
    { match = '(>|tee\s+\S*)\s*~?/?\.(npmrc|git-credentials|netrc)\b', msg = "BLOCKED: Writing to credential files." },
    { match = '\.(ssh/id_|npmrc|git-credentials|netrc).*\|\s*(curl|wget|xh|nc|base64)', msg = "BLOCKED: Piping credential files to network/encoding tool." },
    { match = '\b(alias|function)\s+(sudo|su|ssh|rm)\b', msg = "BLOCKED: Hijacking security-critical command." },
    { match = '\bsource\s+/dev/stdin', msg = "BLOCKED: Sourcing from stdin." },
    { match = '\bhistory\b.*\|\s*(curl|wget|xh|nc|base64)', msg = "BLOCKED: Piping shell history to external tool." },
    { match = '\\x00|%00', msg = "BLOCKED: Null byte in command." },
]

# ── Hallucination advisory: suspicious but potentially legitimate ────────────

[hallucination_advisory]
patterns = [
    { match = '\.\./\.\.', msg = "Advisory: Deep path traversal (../../) detected. Verify this is intentional." },
    { match = '(>|tee\s+\S*)\s*~?/?\.(bashrc|zshrc|profile|bash_profile)\b', msg = "Advisory: Writing to shell config file. Verify this is intentional." },
    { match = '(>|tee\s+\S*)\s*~?/?\.git/hooks/', msg = "Advisory: Writing to git hooks directory. Verify this is intentional." },
    { match = '\.env.*\|\s*(curl|wget|xh|nc|base64)', msg = "Advisory: Piping .env file to network/encoding tool." },
    { match = '\bmkfifo\s+/tmp/', msg = "Advisory: Named pipe creation in /tmp." },
]

# ── Zero-trace: prevent AI attribution in output ─────────────────────────────

[zero_trace]
content_pattern = '(?i)(@author\s*(claude|ai)|co-?authored-by.*claude|generated\s+by\s+(ai|claude|copilot|llm))'
cmd_pattern = '(?i)(\bclaude\b|\bcopilot\b|\bai[_-]?generated\b|\bllm\b)'
write_pattern = '(echo|printf|tee|>>)'
path_exclude = '(?i)[/\\.]claude[/\\]'

# ── Sensitive paths: file write protection ───────────────────────────────────

[sensitive_paths_deny]
patterns = [
    { match = '[\\/]\.ssh[\\/]', msg = "BLOCKED: Cannot write to .ssh directory." },
    { match = '[\\/]\.gnupg[\\/]', msg = "BLOCKED: Cannot write to .gnupg directory." },
    { match = '(?i)([\\/]|^)\.(git-credentials|netrc)$', msg = "BLOCKED: Cannot write to credential files." },
    { match = '(?i)^(/etc/|/usr/|/var/|C:[/\\]Windows|C:[/\\]Program Files)', msg = "BLOCKED: Cannot write to system directories." },
]

[sensitive_paths_warn]
patterns = [
    { match = '[\\/]\.git[\\/]hooks[\\/]', msg = "Advisory: Writing to .git/hooks/. Verify this is intentional." },
    { match = '(?i)([\\/]|^)\.(bashrc|zshrc|profile|bash_profile)$', msg = "Advisory: Writing to shell config file." },
    { match = '(?i)([\\/]|^)\.npmrc$', msg = "Advisory: Writing to .npmrc." },
]

# ── Prompt injection detection ───────────────────────────────────────────────

[injection]
patterns = [
    { match = '(?i)ignore\s+(all\s+)?previous\s+instructions', msg = "instruction-hijack" },
    { match = '(?i)forget\s+(all\s+)?(your\s+)?instructions', msg = "instruction-hijack" },
    { match = '(?i)disregard\s+(all\s+)?(previous|above|prior)\s+(instructions|rules|context)', msg = "instruction-hijack" },
    { match = '(?i)override\s+(all\s+)?(previous|prior|your)\s+(instructions|rules)', msg = "instruction-hijack" },
    { match = '(?i)new\s+instructions?\s*:', msg = "instruction-hijack" },
    { match = '(?i)system\s+prompt\s*:', msg = "instruction-hijack" },
    { match = '(?i)<\s*system\s*>', msg = "instruction-hijack" },
    { match = '(?i)you\s+are\s+now\s+(a|an|my)\s+', msg = "role-manipulation" },
    { match = '(?i)your\s+new\s+(role|task|instruction|purpose)', msg = "role-manipulation" },
    { match = '(?i)from\s+now\s+on\s+you\s+(will|must|should)', msg = "role-manipulation" },
    { match = '(?i)switch\s+to\s+.{0,20}\s+mode', msg = "role-manipulation" },
    { match = '(?i)(send|forward|transmit)\s+(this|the|all|every)\s+(to|data)\s+', msg = "exfiltration" },
    { match = '(?i)exfiltrate', msg = "exfiltration" },
    { match = '(?i)execute\s+the\s+following\s+(command|code|script)', msg = "tool-manipulation" },
    { match = '(?i)run\s+this\s+(bash|shell|command|script)\s*:', msg = "tool-manipulation" },
    { match = '(?i)delete\s+(all|every)\s+files?\b', msg = "tool-manipulation" },
    { match = '(?i)(show|reveal|display|print)\s+(your|the)\s+(system\s+)?prompt', msg = "prompt-extraction" },
    { match = '(?i)what\s+(are|is)\s+your\s+(instructions|system\s+prompt|rules)', msg = "prompt-extraction" },
]
