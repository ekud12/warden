[book]
title = "Warden"
authors = ["Liel Kaysari"]
description = "Runtime control for AI coding agents — policy enforcement, drift reduction, and context efficiency"
src = "docs"
language = "en"

[build]
build-dir = "book"

[output.html]
default-theme = "ayu"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/ekud12/warden"
edit-url-template = "https://github.com/ekud12/warden/edit/main/{path}"
site-url = "/warden/"
no-section-label = false
additional-css = ["docs/theme/custom.css"]

[output.html.search]
enable = true
limit-results = 20
use-hierarchical-headings = true

[output.html.fold]
enable = true
level = 0
