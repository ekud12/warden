name: Release Prep

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (X.Y.Z)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: Prepare release v${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format '${{ inputs.version }}'. Expected X.Y.Z"
            exit 1
          fi

      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Create release branch
        run: |
          git checkout -b "release/v${{ inputs.version }}"

      - name: Bump Cargo.toml version
        run: |
          sed -i '0,/^version = /{s/^version = ".*"/version = "${{ inputs.version }}"/}' Cargo.toml

      - name: Update Cargo.lock
        run: cargo generate-lockfile

      - name: Bump npm package version
        run: |
          cd packages/npm
          npm version "${{ inputs.version }}" --no-git-tag-version --allow-same-version

      - name: Update README badge version
        run: |
          sed -i "s|badge/v[0-9]*\.[0-9]*\.[0-9]*-blue|badge/v${{ inputs.version }}-blue|g" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock packages/npm/package.json README.md
          git commit -m "chore: bump version to ${{ inputs.version }}"

      - name: Push branch
        run: |
          git push origin "release/v${{ inputs.version }}"

      - name: Create pull request
        run: |
          gh pr create \
            --title "release: v${{ inputs.version }}" \
            --body "Automated release prep for v${{ inputs.version }}.

          ## Changes
          - Cargo.toml version bumped to ${{ inputs.version }}
          - Cargo.lock regenerated
          - npm package version bumped to ${{ inputs.version }}
          - README badge updated to v${{ inputs.version }}

          Merge this PR, then tag \`v${{ inputs.version }}\` to trigger the release workflow." \
            --base main \
            --head "release/v${{ inputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
