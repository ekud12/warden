name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build binaries for all platforms ──────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: warden
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: warden
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: warden.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: warden
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: warden

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          ext=""
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then ext=".exe"; fi
          cp "$src" "warden-${{ matrix.target }}${ext}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: warden-${{ matrix.target }}
          path: warden-${{ matrix.target }}*

  # ── GitHub Release ───────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: |
          sha256sum warden-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            warden-*
            checksums-sha256.txt
          generate_release_notes: true
          draft: false

  # ── Publish to crates.io ─────────────────────────────────────────────────
  crates-io:
    name: Publish to crates.io
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true # Don't fail release if crate already exists

  # ── Publish to npm ───────────────────────────────────────────────────────
  npm-publish:
    name: Publish to npm
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Update npm package version
        working-directory: packages/npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version

      - name: Publish
        working-directory: packages/npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

  # ── Update Homebrew tap ──────────────────────────────────────────────────
  homebrew:
    name: Update Homebrew tap
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Calculate SHA256
        id: sha
        run: |
          echo "mac_arm=$(sha256sum warden-aarch64-apple-darwin | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "mac_x64=$(sha256sum warden-x86_64-apple-darwin | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_x64=$(sha256sum warden-x86_64-unknown-linux-gnu | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update formula
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ekud12/homebrew-tap
          event-type: update-formula
          client-payload: |
            {
              "version": "${{ github.ref_name }}",
              "mac_arm_sha": "${{ steps.sha.outputs.mac_arm }}",
              "mac_x64_sha": "${{ steps.sha.outputs.mac_x64 }}",
              "linux_x64_sha": "${{ steps.sha.outputs.linux_x64 }}"
            }
        continue-on-error: true

  # ── Update Scoop bucket ──────────────────────────────────────────────────
  scoop:
    name: Update Scoop bucket
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Calculate SHA256
        id: sha
        run: |
          echo "win_x64=$(sha256sum warden-x86_64-pc-windows-msvc.exe | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update manifest
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ekud12/scoop-bucket
          event-type: update-manifest
          client-payload: |
            {
              "version": "${{ github.ref_name }}",
              "win_x64_sha": "${{ steps.sha.outputs.win_x64 }}"
            }
        continue-on-error: true

  # ── Submit to WinGet ─────────────────────────────────────────────────────
  winget:
    name: Submit to WinGet
    needs: github-release
    runs-on: windows-latest
    steps:
      - name: Install wingetcreate
        run: |
          iwr https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Submit manifest
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $url = "https://github.com/ekud12/warden/releases/download/${{ github.ref_name }}/warden-x86_64-pc-windows-msvc.exe"
          .\wingetcreate.exe update ekud12.warden --version $version --urls $url --token ${{ secrets.WINGET_GITHUB_TOKEN }} --submit
        continue-on-error: true # WinGet submission may need manual approval first time
