name: Ship Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2.0.0)'
        required: true
        type: string
      skip_tests:
        description: 'Skip test step (for hotfixes)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  ship:
    name: Verify, tag, and ship
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Validate version format
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION (expected: X.Y.Z)"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=v$VERSION" >> "$GITHUB_ENV"

      - name: Check tag status
        id: tag_check
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping tag creation"
            echo "TAG_EXISTS=true" >> "$GITHUB_ENV"
          else
            echo "TAG_EXISTS=false" >> "$GITHUB_ENV"
          fi

      - name: Verify Cargo.toml version matches
        run: |
          TOML_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [[ "$TOML_VERSION" != "$VERSION" ]]; then
            echo "::error::Cargo.toml version ($TOML_VERSION) does not match requested version ($VERSION). Commit the version bump first."
            exit 1
          fi
          echo "Version verified: $TOML_VERSION"

      - name: Run tests
        if: ${{ !inputs.skip_tests }}
        run: cargo test --release

      - name: Create and push tag
        if: env.TAG_EXISTS == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "::notice::Tag $TAG created and pushed. Release workflow will trigger automatically."

      - name: Tag already exists — trigger release workflow manually
        if: env.TAG_EXISTS == 'true'
        run: |
          echo "::notice::Tag $TAG exists. Triggering release workflow via workflow_dispatch is not supported for tag-triggered workflows."
          echo "::notice::The release.yml workflow triggers on tag push. Since tag already exists, you may need to delete and re-push it."
          echo "To fix: gh api repos/${{ github.repository }}/git/refs/tags/$TAG -X DELETE && gh api repos/${{ github.repository }}/git/refs -f ref=refs/tags/$TAG -f sha=$(git rev-parse HEAD)"

      - name: Summary
        run: |
          echo "## Release $TAG shipped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: $VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: $TAG" >> "$GITHUB_STEP_SUMMARY"
          echo "- The [Release workflow](../../actions/workflows/release.yml) will now build and publish." >> "$GITHUB_STEP_SUMMARY"
