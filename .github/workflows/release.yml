name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build binaries for all platforms ──────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: warden
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: warden
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: warden.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: warden
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: warden

    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binaries
        shell: bash
        run: |
          ext=""
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then ext=".exe"; fi
          cp "target/${{ matrix.target }}/release/warden${ext}" "warden-${{ matrix.target }}${ext}"
          cp "target/${{ matrix.target }}/release/warden-relay${ext}" "warden-relay-${{ matrix.target }}${ext}"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: warden-${{ matrix.target }}
          path: |
            warden-${{ matrix.target }}*
            warden-relay-${{ matrix.target }}*

  # ── GitHub Release ───────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Generate checksums
        run: |
          sha256sum warden-* warden-relay-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Delete existing release if re-tagging
        run: gh release delete "${{ github.ref_name }}" --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            warden-*
            warden-relay-*
            checksums-sha256.txt
          generate_release_notes: true
          draft: false
          fail_on_unmatched_files: false

  # ── Publish to crates.io ─────────────────────────────────────────────────
  crates-io:
    name: Publish to crates.io
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true # Don't fail release if crate already exists

  # ── Publish to npm ───────────────────────────────────────────────────────
  npm-publish:
    name: Publish to npm
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Update npm package version
        working-directory: packages/npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version

      - name: Publish
        working-directory: packages/npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

  # ── Homebrew / Scoop / WinGet — disabled until repos are created ──────────
  # homebrew:
  #   name: Update Homebrew tap
  #   needs: github-release
  #   ...
  # scoop:
  #   name: Update Scoop bucket
  #   ...
  # winget:
  #   name: Submit to WinGet
  #   ...

